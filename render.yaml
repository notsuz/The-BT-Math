databases:
  - name: btmath-db
    plan: free
    databaseName: btmath
    user: btmath_user

services:
  - type: web
    name: btmath
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: btmath-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.13.0
